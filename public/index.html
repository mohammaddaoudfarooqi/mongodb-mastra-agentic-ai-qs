<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Marshal — Fraud Investigation Console</title>
<style>
  :root {
    --bg:#06090f; --panel:rgba(18,24,34,.72); --border:rgba(120,140,170,.18);
    --ink:#e7edf5; --muted:#8b99ad; --accent:#00d68f; --warn:#f5a623; --crit:#ff5b6e; --mongo:#00ed64;
    --mono:'JetBrains Mono',ui-monospace,SFMono-Regular,Menlo,monospace;
    --sans:'Archivo',system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  * { box-sizing:border-box; }
  body { margin:0; height:100vh; background:radial-gradient(1200px 800px at 70% -10%,#0d1a24,#06090f); color:var(--ink); font-family:var(--sans); overflow:hidden; }
  #hud { display:grid; grid-template-rows:60px 1fr 44px; grid-template-columns:340px 1fr 380px;
         grid-template-areas:"top top top" "left center right" "bottom bottom bottom"; height:100vh; gap:12px; padding:12px; }
  .panel { background:var(--panel); border:1px solid var(--border); border-radius:12px; backdrop-filter:blur(8px); overflow:hidden; }
  #top { grid-area:top; display:flex; align-items:center; gap:16px; padding:0 18px; }
  #brand { font-weight:800; letter-spacing:.14em; font-size:18px; }
  #brand .dot { color:var(--mongo); }
  .chip { font-family:var(--mono); font-size:11px; letter-spacing:.12em; text-transform:uppercase; padding:4px 10px; border-radius:999px; border:1px solid var(--border); color:var(--muted); }
  #left { grid-area:left; } #center { grid-area:center; } #right { grid-area:right; }
  .panel h2 { font-size:11px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted); margin:0; padding:14px 16px 8px; }
  .scroll { overflow-y:auto; height:calc(100% - 38px); padding:0 12px 12px; }
  .card { border:1px solid var(--border); border-left:3px solid var(--muted); border-radius:9px; padding:10px 12px; margin:8px 0; background:rgba(255,255,255,.02); }
  .card.risk-high { border-left-color:var(--crit); box-shadow:0 0 18px rgba(255,91,110,.12); }
  .card.risk-med { border-left-color:var(--warn); }
  .card.risk-low { border-left-color:var(--accent); }
  .row { display:flex; justify-content:space-between; align-items:center; gap:8px; }
  .mono { font-family:var(--mono); }
  .amt { font-family:var(--mono); font-size:15px; font-weight:600; }
  .sub { color:var(--muted); font-size:12px; }
  .pill { font-family:var(--mono); font-size:10px; letter-spacing:.1em; text-transform:uppercase; padding:2px 7px; border-radius:999px; }
  .pill.pending { background:rgba(245,166,35,.16); color:var(--warn); }
  .pill.approved { background:rgba(0,214,143,.16); color:var(--accent); }
  .pill.rejected { background:rgba(255,91,110,.16); color:var(--crit); }
  .pill.escalated { background:rgba(245,166,35,.16); color:var(--warn); }
  .feed-item { font-size:12px; border-bottom:1px dashed var(--border); padding:8px 4px; }
  .feed-item b { color:var(--ink); } .feed-item .t { color:var(--muted); font-family:var(--mono); font-size:10px; }
  .btn { font-family:var(--mono); font-size:12px; letter-spacing:.08em; text-transform:uppercase; border:1px solid var(--border);
         background:rgba(255,255,255,.03); color:var(--ink); padding:7px 12px; border-radius:8px; cursor:pointer; }
  .btn.approve:hover { border-color:var(--accent); color:var(--accent); }
  .btn.reject:hover { border-color:var(--crit); color:var(--crit); }
  #bottom { grid-area:bottom; display:flex; align-items:center; gap:18px; padding:0 18px; font-family:var(--mono); font-size:12px; }
  #live { display:flex; align-items:center; gap:7px; }
  #live .dot { width:8px; height:8px; border-radius:50%; background:var(--crit); }
  #live.on .dot { background:var(--mongo); box-shadow:0 0 8px var(--mongo); }
  #counters span { color:var(--muted); margin-right:14px; } #counters b { color:var(--ink); }
  .empty { color:var(--muted); font-size:12px; padding:12px 4px; }
</style>
</head>
<body>
<div id="hud">
  <div id="top" class="panel">
    <div id="brand">MARSHAL <span class="dot">●</span></div>
    <span class="chip" id="mode">FRAUD INVESTIGATION CONSOLE</span>
    <span class="chip" id="auditChip">AUDIT ⋯</span>
  </div>
  <div id="left" class="panel"><h2>Case Queue</h2><div class="scroll" id="queue"><div class="empty">loading…</div></div></div>
  <div id="center" class="panel"><h2>Review Gate — Human Decision</h2><div class="scroll" id="reviews"><div class="empty">no cases awaiting review</div></div></div>
  <div id="right" class="panel"><h2>Agent Operations Feed</h2><div class="scroll" id="feed"></div></div>
  <div id="bottom" class="panel">
    <div id="live"><span class="dot"></span><span>MongoDB Atlas</span></div>
    <div id="counters"></div>
  </div>
</div>
<script type="module" src="/app.js"></script>
</body>
</html>
